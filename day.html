<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❤️ Dia 8 de 29 ❤️</title>
    <style>
        /* ---------- RESET Y FONDO ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
            background: #0f0c29;
        }

        /* ---------- IMAGEN DE FONDO (opaca) ---------- */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.35;
            filter: blur(1px);
            transition: opacity 0.5s ease;
        }

        /* ---------- ANIMACIÓN DE FONDO (degradado en movimiento) ---------- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ========== NUEVA ANIMACIÓN DE ENTRADA ========== */
        
        /* 1. Cortinilla de corazones que caen */
        .curtain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        .curtain-heart {
            position: absolute;
            font-size: 2.5rem;
            animation: curtainFall 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            text-shadow: 0 0 40px rgba(255, 50, 100, 0.8);
        }

        @keyframes curtainFall {
            0% {
                transform: translateY(-120px) rotate(-30deg) scale(0.2);
                opacity: 0;
            }
            30% {
                opacity: 1;
                transform: translateY(20px) rotate(5deg) scale(1.2);
            }
            60% {
                transform: translateY(60px) rotate(0deg) scale(1);
            }
            100% {
                transform: translateY(120px) rotate(10deg) scale(0.8);
                opacity: 0;
            }
        }

        /* 2. Destello (flash) de entrada */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9;
            background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,200,220,0.4));
            opacity: 0;
            pointer-events: none;
            animation: flashEffect 1.8s ease forwards;
        }

        @keyframes flashEffect {
            0% {
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            40% {
                opacity: 0.2;
            }
            60% {
                opacity: 0.6;
            }
            80% {
                opacity: 0.1;
            }
            100% {
                opacity: 0;
            }
        }

        /* ---------- PARTÍCULAS ---------- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ---------- CORAZONES FLOTANTES (continuos) ---------- */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 1.6rem;
            animation: riseHeart linear infinite;
            opacity: 0;
            text-shadow: 0 0 20px rgba(255, 80, 120, 0.6);
        }

        @keyframes riseHeart {
            0% {
                transform: translateY(110vh) rotate(0deg) scale(0.3);
                opacity: 0;
            }
            20% {
                opacity: 0.9;
                transform: translateY(90vh) rotate(10deg) scale(0.8);
            }
            80% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-10vh) rotate(20deg) scale(1.2);
                opacity: 0;
            }
        }

        /* ---------- TARJETA PRINCIPAL (con nueva entrada) ---------- */
        .card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 50px 60px;
            max-width: 700px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(255, 100, 150, 0.15);
            
            /* NUEVA ANIMACIÓN DE ENTRADA PARA LA TARJETA */
            animation: cardEntrance 2.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: translateY(80px) scale(0.85) rotate(-2deg);
            opacity: 0;
        }

        @keyframes cardEntrance {
            0% {
                transform: translateY(100px) scale(0.7) rotate(-5deg);
                opacity: 0;
            }
            50% {
                transform: translateY(-10px) scale(1.02) rotate(1deg);
                opacity: 0.9;
            }
            75% {
                transform: translateY(5px) scale(0.98) rotate(-0.5deg);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ---------- TEXTO DEL MENSAJE ---------- */
        .message {
            font-size: 2.2rem;
            line-height: 1.6;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .message span {
            display: inline-block;
            animation: textPop 1.2s ease forwards;
            opacity: 0;
            transform: translateY(10px) scale(0.95);
        }

        @keyframes textPop {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .sub-line {
            margin-top: 24px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            animation: subFade 2.5s ease forwards;
            opacity: 0;
        }

        @keyframes subFade {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 600px) {
            .card {
                padding: 30px 24px;
                border-radius: 28px;
            }
            .message {
                font-size: 1.6rem;
            }
            .heart {
                font-size: 1.2rem;
            }
            .curtain-heart {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Fondo con tu imagen (opaca) -->
    <div class="bg-image"></div>

    <!-- Degradado animado (muy sutil) -->
    <div class="bg-animation"></div>

    <!-- ===== NUEVA ANIMACIÓN DE ENTRADA ===== -->
    
    <!-- Cortinilla de corazones -->
    <div class="curtain-overlay" id="curtain"></div>

    <!-- Destello (flash) -->
    <div class="flash-overlay"></div>

    <!-- Partículas -->
    <div class="particles" id="particles"></div>

    <!-- Corazones flotantes (continuos) -->
    <div class="hearts" id="hearts"></div>

    <!-- Tarjeta principal -->
    <div class="card">
        <div class="message" id="message">
            <!-- 🔽 AQUÍ PONES TU TEXTO 🔽 -->
            <span>Hola mi tomatito ❤️, SORPRESA JAJAJA dia 8 de 29 amol, te amo mucho mi vida ❤️</span>
            <span>💖</span>
            <!-- 🔼 HASTA AQUÍ TU TEXTO 🔼 -->
        </div>
        <div class="sub-line">✦ Para mi tomatito de su Amol ✦</div>
    </div>

    <script>
        // ---------- CORTINILLA DE CORAZONES (entrada) ----------
        (function createCurtain() {
            const container = document.getElementById('curtain');
            const emojis = ['❤️', '💕', '💖', '💗', '♥️', '✨', '💝'];
            const count = 45; // cantidad de corazones en la cortinilla
            
            for (let i = 0; i < count; i++) {
                const h = document.createElement('div');
                h.className = 'curtain-heart';
                h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                h.style.left = Math.random() * 100 + '%';
                h.style.fontSize = (Math.random() * 30 + 18) + 'px';
                h.style.animationDuration = (Math.random() * 1.5 + 1.8) + 's';
                h.style.animationDelay = (Math.random() * 0.6) + 's';
                container.appendChild(h);
            }

            // Eliminar la cortinilla después de que termine la animación
            setTimeout(() => {
                container.style.transition = 'opacity 0.8s ease';
                container.style.opacity = '0';
                setTimeout(() => {
                    container.style.display = 'none';
                }, 800);
            }, 2800);
        })();

        // ---------- PARTÍCULAS ----------
        (function createParticles() {
            const container = document.getElementById('particles');
            const count = 55;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 12 + 8) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.background = `rgba(255, 255, 255, ${Math.random() * 0.4 + 0.2})`;
                container.appendChild(p);
            }
        })();

        // ---------- CORAZONES FLOTANTES (continuos) ----------
        (function createHearts() {
            const container = document.getElementById('hearts');
            const emojis = ['❤️', '💕', '💖', '✨', '💗', '♥️'];
            const count = 18;
            for (let i = 0; i < count; i++) {
                const h = document.createElement('div');
                h.className = 'heart';
                h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                h.style.left = Math.random() * 100 + '%';
                h.style.fontSize = (Math.random() * 24 + 16) + 'px';
                h.style.animationDuration = (Math.random() * 12 + 10) + 's';
                h.style.animationDelay = (Math.random() * 14) + 's';
                container.appendChild(h);
            }
        })();

        // ---------- ANIMACIÓN DE CADA PALABRA ----------
        (function animateWords() {
            const message = document.getElementById('message');
            const words = message.querySelectorAll('span');
            words.forEach((word, index) => {
                // Retraso adicional para que las palabras aparezcan después de la entrada principal
                word.style.animationDelay = (0.5 + index * 0.12) + 's';
            });
        })();
    </script>

</body>
</html>
