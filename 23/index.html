<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌸 23 de 29 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fce4ec;
            font-family: 'Segoe UI', sans-serif;
        }
        .game-wrapper {
            background: #f8bbd0;
            padding: 30px 30px 20px;
            border-radius: 40px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #ffe4ec;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #f48fb1, 0 8px 16px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 8px;
            color: #6a1b4d;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .btn {
            background: #f06292;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 #ad1457;
            transition: 0.07s ease;
            cursor: pointer;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #ad1457;
        }
        .btn:hover {
            background: #ec407a;
        }
        .score {
            background: white;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05);
        }
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .hint {
            font-size: 0.9rem;
            color: #880e4f;
            background: #fce4ec;
            padding: 4px 16px;
            border-radius: 30px;
        }
        @media (max-width: 600px) {
            .game-wrapper { padding: 16px; }
            canvas { width: 100%; height: auto; }
            .info { flex-wrap: wrap; gap: 10px; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="720" height="320"></canvas>
    <div class="info">
        <div class="score">🌸 <span id="scoreDisplay">0</span></div>
        <div class="controls">
            
            <button class="btn" id="restartBtn">✨ Reiniciar</button>
        </div>
    </div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        // --- Dimensiones y constantes ---
        const GROUND_Y = 280;
        const PLAYER_X = 70;
        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const OBSTACLE_SPEED_BASE = 5;
        const MAX_OBSTACLES = 4;
        const SAFE_ZONE = 150; // Zona segura donde no pueden aparecer obstáculos

        // --- Estado del juego ---
        let gameOver = false;
        let score = 0;
        let frame = 0;
        let spawnTimer = 0;
        let nextSpawnDelay = 60;
        let lastObstacleX = canvas.width + 100; // Para evitar obstáculos muy cerca

        // --- Cargar imagen de Pochacco ---
        const pochaccoImg = new Image();
        pochaccoImg.src = 'poch.png';
        let imageLoaded = false;
        pochaccoImg.onload = function() {
            imageLoaded = true;
            console.log('✅ Imagen de Pochacco cargada correctamente');
        };
        pochaccoImg.onerror = function() {
            console.error('❌ Error al cargar la imagen. Asegúrate de que "poch.png" esté en la misma carpeta');
        };

        // --- Jugador ---
        const player = {
            x: PLAYER_X,
            y: GROUND_Y - 40,
            width: 40,
            height: 50,
            vy: 0,
            isDucking: false,
            isJumping: false,

            getHitbox() {
                if (this.isDucking) {
                    return {
                        x: this.x + 8,
                        y: this.y + 22,
                        w: this.width - 16,
                        h: this.height - 28
                    };
                } else {
                    return {
                        x: this.x + 8,
                        y: this.y + 6,
                        w: this.width - 16,
                        h: this.height - 14
                    };
                }
            }
        };

        // --- Obstáculos ---
        let obstacles = [];

        const OBSTACLE_TYPES = {
            LOW: 'low',
            HIGH: 'high',
            MEDIUM: 'medium',
            GROUP: 'group'
        };

        // --- Dibujar Pochacco ---
        function drawPochacco(px, py, ducking) {
            if (!imageLoaded) {
                ctx.fillStyle = '#f7a1b5';
                ctx.beginPath();
                ctx.arc(px + 20, py + 20, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a1a1a';
                ctx.font = '12px sans-serif';
                ctx.fillText('Pochacco', px, py + 45);
                return;
            }

            ctx.save();
            
            const imgWidth = pochaccoImg.width;
            const imgHeight = pochaccoImg.height;
            
            let srcX = 0;
            let srcY = 0;
            let srcW = imgWidth;
            let srcH = imgHeight;
            
            if (ducking && imgWidth > 1) {
                srcX = imgWidth / 2;
                srcW = imgWidth / 2;
            } else if (imgWidth > 1) {
                srcX = 0;
                srcW = imgWidth / 2;
            }
            
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.shadowBlur = 8;
            
            let drawY = py;
            let drawH = player.height;
            let drawW = player.width;
            
            if (ducking) {
                drawY = py + 12;
                drawH = player.height - 12;
                drawW = player.width + 8;
            }
            
            ctx.drawImage(
                pochaccoImg,
                srcX, 0, srcW, imgHeight,
                px - 4, drawY, drawW, drawH
            );
            
            ctx.restore();
        }

        // --- Dibujar flores ---
        function drawFlower(x, y, size, type, colorVariant = 0) {
            ctx.save();
            
            const colors = [
                ['#f2a6c4', '#f7c5cc', '#f7d6e0', '#f9e0e9', '#ffb7c5'],
                ['#ffb3c6', '#ffc2d1', '#ffd1dc', '#ffe0e6', '#ffb3c6'],
                ['#f8c8dc', '#fcd5e3', '#ffe0ec', '#ffebf0', '#f8c8dc']
            ];
            
            const colorSet = colors[colorVariant % colors.length];
            const petalCount = type === 'high' ? 8 : 6;
            const cx = x + size/2;
            const cy = y + size/2 - 2;
            
            if (type !== 'high') {
                ctx.strokeStyle = '#6a994e';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x + size/2, y + size);
                ctx.lineTo(x + size/2, y + size/2 + 6);
                ctx.stroke();
            }
            
            for (let i = 0; i < petalCount; i++) {
                const angle = (i / petalCount) * Math.PI * 2 + 0.2;
                const px = cx + Math.cos(angle) * (type === 'high' ? 12 : 10);
                const py = cy + Math.sin(angle) * (type === 'high' ? 12 : 10);
                ctx.fillStyle = colorSet[i % colorSet.length];
                ctx.shadowColor = 'rgba(0,0,0,0.05)';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(px, py, type === 'high' ? 9 : 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#e8a0b4';
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }
            
            ctx.shadowBlur = 4;
            ctx.fillStyle = '#f7dc6f';
            ctx.beginPath();
            ctx.arc(cx, cy, type === 'high' ? 7 : 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#d4a373';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.fillStyle = '#4a2e1b';
            if (type === 'high') {
                ctx.beginPath();
                ctx.arc(cx - 3, cy - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 3, cy - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx, cy + 2, 4, 0.1, Math.PI - 0.1);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(cx - 2, cy - 1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 3, cy - 1, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        // --- Verificar si un obstáculo puede aparecer ---
        function canSpawnObstacle(x, width) {
            // Verificar que no esté en la zona segura del jugador
            if (x - width < PLAYER_X + SAFE_ZONE) {
                return false;
            }
            
            // Verificar que no esté muy cerca de otro obstáculo
            const minDistance = 150;
            for (let obs of obstacles) {
                const obsRight = obs.x + obs.width;
                if (Math.abs(obsRight - x) < minDistance) {
                    return false;
                }
            }
            
            return true;
        }

        // --- Generar obstáculos ---
        function spawnObstacle() {
            const currentSpeed = OBSTACLE_SPEED_BASE + Math.floor(score / 200);
            const types = [];
            
            if (score < 100) {
                types.push(OBSTACLE_TYPES.LOW);
            } else if (score < 300) {
                types.push(OBSTACLE_TYPES.LOW, OBSTACLE_TYPES.MEDIUM);
            } else if (score < 500) {
                types.push(OBSTACLE_TYPES.LOW, OBSTACLE_TYPES.MEDIUM, OBSTACLE_TYPES.HIGH);
            } else {
                types.push(OBSTACLE_TYPES.LOW, OBSTACLE_TYPES.MEDIUM, OBSTACLE_TYPES.HIGH, OBSTACLE_TYPES.GROUP);
            }
            
            const type = types[Math.floor(Math.random() * types.length)];
            const size = 22 + Math.floor(Math.random() * 8);
            
            // Posición inicial (desde la derecha)
            let startX = canvas.width + 20;
            
            // Si hay obstáculos, asegurar distancia
            if (obstacles.length > 0) {
                const lastObs = obstacles[obstacles.length - 1];
                startX = Math.max(startX, lastObs.x + lastObs.width + 180 + Math.random() * 100);
            }
            
            // Verificar que no aparezca en la zona segura
            if (!canSpawnObstacle(startX, size)) {
                return; // No spawnear este obstáculo
            }
            
            let obstacle = {
                x: startX,
                width: size,
                height: size,
                size: size,
                speed: currentSpeed,
                type: type,
                colorVariant: Math.floor(Math.random() * 3)
            };
            
            switch(type) {
                case OBSTACLE_TYPES.LOW:
                    obstacle.y = GROUND_Y - size + 6;
                    break;
                case OBSTACLE_TYPES.MEDIUM:
                    obstacle.y = GROUND_Y - size - 15;
                    break;
                case OBSTACLE_TYPES.HIGH:
                    obstacle.y = GROUND_Y - size - 50;
                    break;
                case OBSTACLE_TYPES.GROUP:
                    const count = 2 + Math.floor(Math.random() * 2);
                    obstacle.group = [];
                    let groupWidth = 0;
                    for (let i = 0; i < count; i++) {
                        const groupSize = 18 + Math.floor(Math.random() * 8);
                        const flowerX = i * (groupSize + 15);
                        obstacle.group.push({
                            x: startX + flowerX,
                            y: GROUND_Y - groupSize + 6,
                            size: groupSize,
                            colorVariant: Math.floor(Math.random() * 3)
                        });
                        groupWidth += groupSize + 15;
                    }
                    obstacle.width = groupWidth;
                    obstacle.height = size;
                    break;
            }
            
            obstacles.push(obstacle);
        }

        // --- Colisiones ---
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        // --- Reset ---
        function resetGame() {
            gameOver = false;
            score = 0;
            frame = 0;
            spawnTimer = 0;
            nextSpawnDelay = 60;
            lastObstacleX = canvas.width + 100;
            obstacles = [];
            player.y = GROUND_Y - player.height;
            player.vy = 0;
            player.isJumping = false;
            player.isDucking = false;
            scoreSpan.textContent = '0';
        }

        // --- Actualizar ---
        function update() {
            if (gameOver) return;

            // Gravedad
            if (player.isJumping || player.y < GROUND_Y - player.height) {
                player.vy += GRAVITY;
                player.y += player.vy;
                if (player.y >= GROUND_Y - player.height) {
                    player.y = GROUND_Y - player.height;
                    player.vy = 0;
                    player.isJumping = false;
                }
            }

            const currentSpeed = OBSTACLE_SPEED_BASE + Math.floor(score / 200);
            
            // Mover obstáculos
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= currentSpeed;
                
                if (obs.type === OBSTACLE_TYPES.GROUP && obs.group) {
                    for (let flower of obs.group) {
                        flower.x -= currentSpeed;
                    }
                }
                
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    continue;
                }
            }

            // Generar obstáculos
            spawnTimer++;
            const minDelay = Math.max(50, 90 - Math.floor(score / 30));
            const maxDelay = Math.max(70, 130 - Math.floor(score / 30));
            
            if (spawnTimer >= nextSpawnDelay && obstacles.length < MAX_OBSTACLES) {
                // Intentar spawnear hasta 3 veces si falla
                let attempts = 0;
                let spawned = false;
                while (!spawned && attempts < 3) {
                    const oldLength = obstacles.length;
                    spawnObstacle();
                    if (obstacles.length > oldLength) {
                        spawned = true;
                    }
                    attempts++;
                }
                
                nextSpawnDelay = minDelay + Math.floor(Math.random() * (maxDelay - minDelay));
                spawnTimer = 0;
            }

            // Colisiones
            const playerHitbox = player.getHitbox();
            for (let obs of obstacles) {
                if (obs.type === OBSTACLE_TYPES.GROUP && obs.group) {
                    for (let flower of obs.group) {
                        const flowerHitbox = {
                            x: flower.x + 4,
                            y: flower.y + 4,
                            w: flower.size - 8,
                            h: flower.size - 8
                        };
                        if (checkCollision(playerHitbox, flowerHitbox)) {
                            gameOver = true;
                            break;
                        }
                    }
                } else {
                    const obsHitbox = {
                        x: obs.x + 4,
                        y: obs.y + 4,
                        w: obs.width - 8,
                        h: obs.height - 8
                    };
                    if (checkCollision(playerHitbox, obsHitbox)) {
                        gameOver = true;
                        break;
                    }
                }
                if (gameOver) break;
            }

            // Puntuación
            if (!gameOver) {
                score++;
                const displayScore = Math.floor(score / 5);
                scoreSpan.textContent = displayScore;
            }

            frame++;
        }

        // --- Dibujar ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Fondo
            ctx.fillStyle = '#ffe4ec';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Suelo
            ctx.fillStyle = '#f8bbd0';
            ctx.fillRect(0, GROUND_Y, canvas.width, 6);
            ctx.fillStyle = '#f48fb1';
            ctx.fillRect(0, GROUND_Y + 2, canvas.width, 2);

            // Obstáculos
            for (let obs of obstacles) {
                if (obs.type === OBSTACLE_TYPES.GROUP && obs.group) {
                    for (let flower of obs.group) {
                        drawFlower(flower.x, flower.y, flower.size, 'low', flower.colorVariant);
                    }
                } else {
                    drawFlower(obs.x, obs.y, obs.size, obs.type, obs.colorVariant);
                }
            }

            // Pochacco
            drawPochacco(player.x, player.y, player.isDucking);

            // Game Over
            if (gameOver) {
                ctx.save();
                ctx.font = 'bold 34px "Segoe UI", sans-serif';
                ctx.fillStyle = '#6a1b4d';
                ctx.shadowColor = 'rgba(255,255,255,0.7)';
                ctx.shadowBlur = 14;
                ctx.textAlign = 'center';
                ctx.fillText('🌸 ¡Oh no!', canvas.width/2, 130);
                ctx.font = '20px sans-serif';
                ctx.fillStyle = '#880e4f';
                ctx.fillText('Presiona "Reiniciar"', canvas.width/2, 175);
                ctx.restore();
            }

            // Puntuación
            ctx.fillStyle = '#6a1b4d';
            ctx.font = 'bold 14px sans-serif';
            const displayScore = Math.floor(score / 5);
            ctx.fillText('🌸 Puntuación: ' + displayScore, 20, 30);
            ctx.fillText('⚡ Velocidad: ' + (OBSTACLE_SPEED_BASE + Math.floor(score / 200)), 20, 50);
        }

        // --- Loop ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- Eventos de teclado ---
        function handleKeyDown(e) {
            if (gameOver) return;
            const key = e.key;
            if (key === 'ArrowUp' || key === ' ') {
                e.preventDefault();
                if (!player.isJumping && player.y >= GROUND_Y - player.height - 2) {
                    player.vy = JUMP_FORCE;
                    player.isJumping = true;
                    player.isDucking = false;
                }
            } else if (key === 'ArrowDown') {
                e.preventDefault();
                if (!player.isJumping) {
                    player.isDucking = true;
                }
            }
        }

        function handleKeyUp(e) {
            const key = e.key;
            if (key === 'ArrowDown') {
                e.preventDefault();
                player.isDucking = false;
                if (!player.isJumping) {
                    player.y = GROUND_Y - player.height;
                }
            }
            if (key === 'ArrowUp' || key === ' ') {
                e.preventDefault();
            }
        }

        function handleCanvasClick(e) {
            if (gameOver) return;
            if (!player.isJumping && player.y >= GROUND_Y - player.height - 2) {
                player.vy = JUMP_FORCE;
                player.isJumping = true;
                player.isDucking = false;
            }
        }

        // --- Event listeners ---
        document.getElementById('restartBtn').addEventListener('click', resetGame);

        window.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault();
            }
        });

        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('click', handleCanvasClick);

        // --- Iniciar ---
        resetGame();
        gameLoop();

        window.addEventListener('unload', () => {
            document.removeEventListener('keydown', handleKeyDown);
            document.removeEventListener('keyup', handleKeyUp);
            canvas.removeEventListener('click', handleCanvasClick);
        });
    })();
</script>
</body>
</html>
