<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❤️ Cuenta Regresiva ❤️</title>
    <style>
        /* ---------- RESET Y FONDO ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
            background: #0f0c29;
        }

        /* ---------- IMAGEN DE FONDO (opaca) ---------- */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('https://media.discordapp.net/attachments/1309443209717612574/1524187808317702366/IMG-20260303-WA0014.jpg?ex=6a4ed603&is=6a4d8483&hm=7a8ab1b11e9bd4c3fbd60b080a3b36023ce317cab8d64c76ea614a34b4773c8f&=&format=webp&width=838&height=559');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.35;
            filter: blur(1px);
            transition: opacity 0.5s ease;
        }

        /* ---------- ANIMACIÓN DE FONDO (degradado en movimiento) ---------- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ========== ANIMACIÓN DE ENTRADA ========== */
        
        /* 1. Cortinilla de corazones que caen */
        .curtain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        .curtain-heart {
            position: absolute;
            font-size: 2.5rem;
            animation: curtainFall 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            text-shadow: 0 0 40px rgba(255, 50, 100, 0.8);
        }

        @keyframes curtainFall {
            0% {
                transform: translateY(-120px) rotate(-30deg) scale(0.2);
                opacity: 0;
            }
            30% {
                opacity: 1;
                transform: translateY(20px) rotate(5deg) scale(1.2);
            }
            60% {
                transform: translateY(60px) rotate(0deg) scale(1);
            }
            100% {
                transform: translateY(120px) rotate(10deg) scale(0.8);
                opacity: 0;
            }
        }

        /* 2. Destello (flash) de entrada */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9;
            background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,200,220,0.4));
            opacity: 0;
            pointer-events: none;
            animation: flashEffect 1.8s ease forwards;
        }

        @keyframes flashEffect {
            0% {
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            40% {
                opacity: 0.2;
            }
            60% {
                opacity: 0.6;
            }
            80% {
                opacity: 0.1;
            }
            100% {
                opacity: 0;
            }
        }

        /* ---------- PARTÍCULAS ---------- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ---------- CORAZONES FLOTANTES (continuos) ---------- */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 1.6rem;
            animation: riseHeart linear infinite;
            opacity: 0;
            text-shadow: 0 0 20px rgba(255, 80, 120, 0.6);
        }

        @keyframes riseHeart {
            0% {
                transform: translateY(110vh) rotate(0deg) scale(0.3);
                opacity: 0;
            }
            20% {
                opacity: 0.9;
                transform: translateY(90vh) rotate(10deg) scale(0.8);
            }
            80% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-10vh) rotate(20deg) scale(1.2);
                opacity: 0;
            }
        }

        /* ========== TARJETA PRINCIPAL ========== */
        .card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 50px 60px;
            max-width: 750px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(255, 100, 150, 0.15);
            
            animation: cardEntrance 2.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: translateY(80px) scale(0.85) rotate(-2deg);
            opacity: 0;
        }

        @keyframes cardEntrance {
            0% {
                transform: translateY(100px) scale(0.7) rotate(-5deg);
                opacity: 0;
            }
            50% {
                transform: translateY(-10px) scale(1.02) rotate(1deg);
                opacity: 0.9;
            }
            75% {
                transform: translateY(5px) scale(0.98) rotate(-0.5deg);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ---------- TÍTULO ---------- */
        .title {
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
            animation: textPop 1.2s ease forwards;
            opacity: 0;
            animation-delay: 0.3s;
        }

        .title span {
            color: #ff6b8a;
        }

        /* ---------- CONTADOR ---------- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 15px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 18px 22px;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            animation: textPop 1.2s ease forwards;
            opacity: 0;
        }

        .countdown-item:nth-child(1) { animation-delay: 0.5s; }
        .countdown-item:nth-child(2) { animation-delay: 0.65s; }
        .countdown-item:nth-child(3) { animation-delay: 0.8s; }
        .countdown-item:nth-child(4) { animation-delay: 0.95s; }

        .countdown-number {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 100, 150, 0.3);
            line-height: 1;
            font-family: 'Arial', sans-serif;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .countdown-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
            font-weight: 300;
        }

        /* ---------- MENSAJE ESPECIAL ---------- */
        .special-message {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            font-style: italic;
            letter-spacing: 0.5px;
            animation: textPop 1.2s ease forwards;
            opacity: 0;
            animation-delay: 1.1s;
        }

        .special-message span {
            color: #ff6b8a;
            font-weight: 600;
        }

        .sub-line {
            margin-top: 18px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            animation: textPop 1.2s ease forwards;
            opacity: 0;
            animation-delay: 1.3s;
        }

        @keyframes textPop {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
                border-radius: 28px;
            }
            .countdown {
                gap: 10px;
            }
            .countdown-item {
                padding: 12px 14px;
                min-width: 60px;
            }
            .countdown-number {
                font-size: 2.4rem;
                min-height: 45px;
            }
            .countdown-label {
                font-size: 0.6rem;
                letter-spacing: 2px;
            }
            .title {
                font-size: 1.3rem;
            }
            .special-message {
                font-size: 1rem;
            }
            .curtain-heart {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 400px) {
            .countdown-item {
                padding: 8px 10px;
                min-width: 50px;
            }
            .countdown-number {
                font-size: 1.8rem;
                min-height: 35px;
            }
            .countdown-label {
                font-size: 0.5rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <!-- Fondo con tu imagen (opaca) -->
    <div class="bg-image"></div>

    <!-- Degradado animado (muy sutil) -->
    <div class="bg-animation"></div>

    <!-- ===== ANIMACIÓN DE ENTRADA ===== -->
    
    <!-- Cortinilla de corazones -->
    <div class="curtain-overlay" id="curtain"></div>

    <!-- Destello (flash) -->
    <div class="flash-overlay"></div>

    <!-- Partículas -->
    <div class="particles" id="particles"></div>

    <!-- Corazones flotantes (continuos) -->
    <div class="hearts" id="hearts"></div>

    <!-- Tarjeta principal -->
    <div class="card">
        <div class="title">
            ⏳ Faltan <span id="daysDisplay">--</span> días para el <span>29 de Julio</span>
        </div>

        <div class="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="days">00</div>
                <div class="countdown-label">Días</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Horas</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">00</div>
                <div class="countdown-label">Minutos</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">00</div>
                <div class="countdown-label">Segundos</div>
            </div>
        </div>

        <div class="special-message" id="specialMessage">
            💕 YA FALTA POCO AMOL 💕
        </div>
        <div class="sub-line">✦ Para mi tomatito, con todo mi amor ✦</div>
    </div>

    <script>
        // ========== CORTINILLA DE CORAZONES (entrada) ==========
        (function createCurtain() {
            const container = document.getElementById('curtain');
            const emojis = ['❤️', '💕', '💖', '💗', '♥️', '✨', '💝'];
            const count = 45;
            
            for (let i = 0; i < count; i++) {
                const h = document.createElement('div');
                h.className = 'curtain-heart';
                h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                h.style.left = Math.random() * 100 + '%';
                h.style.fontSize = (Math.random() * 30 + 18) + 'px';
                h.style.animationDuration = (Math.random() * 1.5 + 1.8) + 's';
                h.style.animationDelay = (Math.random() * 0.6) + 's';
                container.appendChild(h);
            }

            setTimeout(() => {
                container.style.transition = 'opacity 0.8s ease';
                container.style.opacity = '0';
                setTimeout(() => {
                    container.style.display = 'none';
                }, 800);
            }, 2800);
        })();

        // ========== PARTÍCULAS ==========
        (function createParticles() {
            const container = document.getElementById('particles');
            const count = 55;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 12 + 8) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.background = `rgba(255, 255, 255, ${Math.random() * 0.4 + 0.2})`;
                container.appendChild(p);
            }
        })();

        // ========== CORAZONES FLOTANTES (continuos) ==========
        (function createHearts() {
            const container = document.getElementById('hearts');
            const emojis = ['❤️', '💕', '💖', '✨', '💗', '♥️'];
            const count = 18;
            for (let i = 0; i < count; i++) {
                const h = document.createElement('div');
                h.className = 'heart';
                h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                h.style.left = Math.random() * 100 + '%';
                h.style.fontSize = (Math.random() * 24 + 16) + 'px';
                h.style.animationDuration = (Math.random() * 12 + 10) + 's';
                h.style.animationDelay = (Math.random() * 14) + 's';
                container.appendChild(h);
            }
        })();

        // ========== CUENTA REGRESIVA ==========
        (function startCountdown() {
            // Fecha objetivo: 29 de julio de 2026 a las 00:00:00
            const targetDate = new Date('2026-07-29T00:00:00').getTime();

            // Elementos del DOM
            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const daysDisplayEl = document.getElementById('daysDisplay');
            const specialMessageEl = document.getElementById('specialMessage');

            // Mensajes especiales según los días que faltan
            const messages = [
                { days: 0, text: '🎉 ¡HOY ES EL DÍA! ¡TE AMO MI VIDA! 🎉' },
                { days: 1, text: '💕 ¡MAÑANA ES EL GRAN DÍA! 💕' },
                { days: 2, text: '✨ ¡Ya casi, mi amor! ¡Faltan 2 días! ✨' },
                { days: 3, text: '🌟 3 días... la emoción crece 🌟' },
                { days: 5, text: '💖 Cada día que pasa te quiero más 💖' },
                { days: 7, text: '🌈 Una semana para el día especial 🌈' },
                { days: 10, text: '💗 10 días... el tiempo vuela contigo 💗' },
                { days: 15, text: '🌹 Dos semanas... cada día más cerca de ti 🌹' },
                { days: 20, text: '💕 20 días... mi corazón late más fuerte 💕' },
                { days: 30, text: '❤️ Un mes... la espera vale la pena ❤️' },
                { days: 60, text: '💖 Cada segundo me acerca más a ti 💖' },
            ];

            function getSpecialMessage(daysLeft) {
                // Si ya pasó la fecha
                if (daysLeft < 0) {
                    return '🎉 ¡Ya pasó el 29 de julio! ¡Te amo cada día más! ❤️';
                }
                // Buscar el mensaje más adecuado
                let selected = messages[0];
                for (const msg of messages) {
                    if (daysLeft >= msg.days) {
                        selected = msg;
                    }
                }
                return selected.text;
            }

            function updateCountdown() {
                const now = new Date().getTime();
                let distance = targetDate - now;

                // Si la fecha ya pasó
                if (distance < 0) {
                    distance = 0;
                }

                // Cálculos
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // Actualizar DOM con formato de dos dígitos
                daysEl.textContent = String(days).padStart(2, '0');
                hoursEl.textContent = String(hours).padStart(2, '0');
                minutesEl.textContent = String(minutes).padStart(2, '0');
                secondsEl.textContent = String(seconds).padStart(2, '0');

                // Actualizar el título con los días
                if (days === 0 && distance > 0) {
                    daysDisplayEl.textContent = 'menos de 1';
                } else {
                    daysDisplayEl.textContent = days;
                }

                // Actualizar el mensaje especial
                specialMessageEl.textContent = getSpecialMessage(days);
            }

            // Actualizar cada segundo
            updateCountdown();
            setInterval(updateCountdown, 1000);
        })();
    </script>

</body>
</html>
