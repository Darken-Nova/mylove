<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Día 19 de 29 ❤️</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0710;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Contenedor - ocupa toda la pantalla en móvil */
        .video-container {
            width: 100%;
            height: 100vh;
            max-width: 430px;
            background: linear-gradient(145deg, #2d1b33, #160b1a);
            padding: 20px 16px 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            animation: encender 0.8s ease-out;
        }

        @keyframes encender {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Barra superior */
        .video-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .video-bar .dots {
            display: flex;
            gap: 5px;
        }
        .video-bar .dots span {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-red { background: #ff5f5f; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #28c840; }

        .video-bar .titulo {
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(255, 138, 174, 0.5);
        }

        /* Frame de video */
        .video-frame {
            flex: 1;
            border-radius: 18px;
            overflow: hidden;
            margin: 12px 0 10px;
            position: relative;
            background: #0e0810;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            touch-action: manipulation;
            cursor: pointer;
        }

        /* Slides */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            text-align: center;
        }

        .slide.active {
            opacity: 1;
        }

        /* SLIDE 1 */
        .slide-1 {
            background: linear-gradient(135deg, #2a1a30, #160b1a);
        }

        .slide-1 .emoji-big {
            font-size: 64px;
            margin-bottom: 12px;
            animation: latido 2s infinite;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .slide-1 h1 {
            font-size: 28px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: 1px;
        }

        .slide-1 h1 span {
            font-weight: 700;
            color: #ff8aae;
        }

        .slide-1 .pregunta {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 6px;
            font-style: italic;
            border-left: 3px solid #ff8aae;
            padding-left: 14px;
        }

        /* Foto de ella en slide 1 */
        .foto-ella {
            margin-top: 16px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 138, 174, 0.25);
            box-shadow: 0 0 50px rgba(255, 138, 174, 0.1);
            background: #1a0e1e;
        }

        .foto-label {
            margin-top: 6px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.12);
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }

        /* SLIDE 2 */
        .slide-2 {
            background: linear-gradient(145deg, #1f1225, #0d080f);
            justify-content: center;
            gap: 4px;
        }

        .slide-2 .corazoncitos {
            font-size: 28px;
            letter-spacing: 6px;
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .slide-2 .mensaje {
            font-size: 17px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.92);
            max-width: 340px;
            font-family: 'Georgia', serif;
            font-style: italic;
            padding: 0 4px;
        }

        .slide-2 .mensaje strong {
            color: #ff8aae;
            font-weight: 700;
            font-style: normal;
        }

        .slide-2 .mensaje .highlight {
            color: #ffb3cc;
            font-size: 20px;
            font-weight: 700;
        }

        .slide-2 .apodo {
            font-size: 24px;
            color: #ff8aae;
            font-weight: 700;
            margin-top: 6px;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }

        .slide-2 .fecha {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Courier New', monospace;
            margin-top: 6px;
            letter-spacing: 3px;
        }

        /* Foto de los 2 en slide 2 */
        .foto-dos {
            margin-top: 10px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 138, 174, 0.15);
            background: #1a0e1e;
        }

        /* Barra de progreso */
        .progress-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff8aae, #ff5f8a);
            border-radius: 10px;
            animation: progreso 8s linear forwards;
        }

        @keyframes progreso {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Controles */
        .video-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 18px;
            padding-top: 8px;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            flex-shrink: 0;
        }

        .video-controls span {
            font-size: 10px;
            opacity: 0.3;
            letter-spacing: 2px;
        }

        .video-controls .control-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 20px;
            padding: 4px 10px;
            cursor: pointer;
            touch-action: manipulation;
            font-family: 'Courier New', monospace;
        }

        .video-controls .control-btn:active {
            color: #ff8aae;
            transform: scale(0.9);
        }

        /* Indicador de pausa flotante */
        .pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .pause-indicator.show {
            opacity: 1;
        }

        /* Responsive para pantallas muy pequeñas */
        @media (max-width: 380px) {
            .video-container { padding: 12px 10px 16px; }
            .slide-1 h1 { font-size: 22px; }
            .slide-2 .mensaje { font-size: 15px; line-height: 1.6; }
            .slide-1 .emoji-big { font-size: 48px; }
            .slide-2 .apodo { font-size: 20px; }
            .foto-ella { width: 90px; height: 90px; }
            .foto-dos { width: 65px; height: 65px; }
            .video-bar .titulo { font-size: 9px; }
        }

        @media (max-height: 650px) {
            .slide-1 .emoji-big { font-size: 40px; margin-bottom: 6px; }
            .slide-1 h1 { font-size: 20px; }
            .slide-1 .pregunta { font-size: 14px; }
            .slide-2 .mensaje { font-size: 14px; line-height: 1.5; }
            .slide-2 .apodo { font-size: 18px; }
            .foto-ella { width: 80px; height: 80px; margin-top: 8px; }
            .foto-dos { width: 55px; height: 55px; margin-top: 6px; }
            .video-frame { margin: 6px 0; }
        }

        /* Ocultar scroll y selección */
        ::-webkit-scrollbar { display: none; }
        body { -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body>

<div class="video-container">

    <!-- Barra superior -->
    <div class="video-bar">
        <div class="dots">
            <span class="dot-red"></span>
            <span class="dot-yellow"></span>
            <span class="dot-green"></span>
        </div>
        <span class="titulo">♥ 19 / 29 ♥</span>
        <span style="font-size:14px;">🍅</span>
    </div>

    <!-- Frame -->
    <div class="video-frame" id="videoFrame">

        <!-- Indicador de pausa -->
        <div class="pause-indicator" id="pauseIndicator">⏸</div>

        <!-- SLIDE 1: Foto de ELLA -->
        <div class="slide slide-1 active" id="slide1">
            <div class="emoji-big">🌸</div>
            <h1>¿Y si te digo que...</h1>
            <div class="pregunta">— hoy tengo algo para ti —</div>

            <!-- === REEMPLAZA "foto-ella.jpg" por tu imagen === -->
            <img src="04.jpg" alt="Ella" class="foto-ella" />

            <div class="foto-label">✦ TÚ ✦</div>
        </div>

        <!-- SLIDE 2: Foto de LOS 2 + mensaje -->
        <div class="slide slide-2" id="slide2">
            <div class="corazoncitos">💕 ✨ 💕</div>
            <div class="mensaje">
                "...hoy 19, solo faltan <strong>10 días</strong> para tu cumple, amol.<br><br>
                Ya quiero que sea <span class="highlight">29</span> para poder felicitarte<br>
                en tu día especial, mi vida.<br><br>
                <strong>Te amo mucho, mi tomatito</strong> 🍅"
            </div>
            <div class="apodo">❤️ TOMATITO ❤️</div>
            <div class="fecha">19 · 29 · 2026</div>

            <!-- === REEMPLAZA "foto-los-dos.jpg" por tu imagen === -->
            <img src="03.jpg" alt="Los dos" class="foto-dos" />
        </div>

    </div>

    <!-- Barra de progreso -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Controles -->
    <div class="video-controls">
        <span>◄◄</span>
        <button class="control-btn" id="playBtn">▶</button>
        <button class="control-btn" id="resetBtn">⟳</button>
        <span style="font-size:9px;">19/29</span>
    </div>

</div>

<script>
    // =========================================================
    // ELEMENTOS
    // =========================================================
    const slide1 = document.getElementById('slide1');
    const slide2 = document.getElementById('slide2');
    const frame = document.getElementById('videoFrame');
    const progressBar = document.getElementById('progressBar');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const pauseIndicator = document.getElementById('pauseIndicator');

    let pausado = false;
    let timeoutId = null;
    let animationPaused = false;
    let currentTime = 0;

    // =========================================================
    // FUNCIÓN: Cambiar a slide 2
    // =========================================================
    function cambiarASlide2() {
        slide1.classList.remove('active');
        slide2.classList.add('active');
        playBtn.textContent = '⏸';
        pausado = false;
    }

    // =========================================================
    // FUNCIÓN: Iniciar temporizador
    // =========================================================
    function iniciarTemporizador() {
        if (timeoutId) clearTimeout(timeoutId);
        if (!pausado && slide1.classList.contains('active')) {
            timeoutId = setTimeout(cambiarASlide2, 3500);
        }
    }

    // =========================================================
    // FUNCIÓN: Pausar/Reanudar
    // =========================================================
    function togglePausa() {
        if (slide2.classList.contains('active')) {
            // Si ya está en slide 2, no hace nada (o reinicia)
            return;
        }

        pausado = !pausado;

        if (pausado) {
            // PAUSAR
            clearTimeout(timeoutId);
            progressBar.style.animationPlayState = 'paused';
            playBtn.textContent = '▶';
            pauseIndicator.classList.add('show');
            setTimeout(() => pauseIndicator.classList.remove('show'), 600);
        } else {
            // REANUDAR
            progressBar.style.animationPlayState = 'running';
            playBtn.textContent = '⏸';
            iniciarTemporizador();
        }
    }

    // =========================================================
    // FUNCIÓN: Reiniciar
    // =========================================================
    function reiniciar() {
        clearTimeout(timeoutId);
        pausado = false;
        playBtn.textContent = '⏸';

        // Volver a slide 1
        slide2.classList.remove('active');
        slide1.classList.add('active');

        // Reiniciar barra
        progressBar.style.animation = 'none';
        void progressBar.offsetHeight; // trigger reflow
        progressBar.style.animation = 'progreso 8s linear forwards';
        progressBar.style.animationPlayState = 'running';

        // Iniciar temporizador
        iniciarTemporizador();
    }

    // =========================================================
    // EVENTOS
    // =========================================================

    // Click en el frame = pausa
    frame.addEventListener('click', togglePausa);

    // Botón play/pausa
    playBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePausa();
    });

    // Botón reiniciar
    resetBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        reiniciar();
    });

    // =========================================================
    // INICIO
    // =========================================================
    iniciarTemporizador();

    // Cuando termina la barra
    progressBar.addEventListener('animationend', () => {
        // Si terminó y aún no cambió, forzamos cambio
        if (slide1.classList.contains('active')) {
            cambiarASlide2();
        }
    });

    console.log('❤️ Día 19 de 29 — Para mi tomatito ❤️');
</script>

</body>
</html>
