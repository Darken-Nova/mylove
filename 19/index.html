<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Día 19 de 29 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0710;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
            touch-action: manipulation;
            padding: 8px;
        }

        /* Contenedor principal - ocupa todo el ancho del celular */
        .video-container {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            max-height: 780px;
            background: linear-gradient(145deg, #2d1b33, #160b1a);
            border-radius: 28px;
            padding: 16px 14px 18px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            animation: encender 0.8s ease-out;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
        }

        @keyframes encender {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Barra superior */
        .video-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            font-family: 'Courier New', monospace;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .video-bar .dots {
            display: flex;
            gap: 5px;
        }
        .video-bar .dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-red { background: #ff5f5f; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #28c840; }

        .video-bar .titulo {
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(255, 138, 174, 0.5);
        }

        /* Frame de video - AHORA CON FLEX Y SIN ALTURA FIJA */
        .video-frame {
            flex: 1;
            border-radius: 16px;
            overflow: hidden;
            margin: 8px 0 8px;
            position: relative;
            background: #0e0810;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            /* <-- Esto evita que se estire */
            touch-action: manipulation;
            cursor: pointer;
            width: 100%;
        }

        /* Slides - AHORA CON POSITION ABSOLUTE Y 100% */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 18px;
            opacity: 0;
            transition: opacity 0.9s ease-in-out;
            text-align: center;
        }

        .slide.active {
            opacity: 1;
        }

        /* SLIDE 1 */
        .slide-1 {
            background: linear-gradient(135deg, #2a1a30, #160b1a);
        }

        .slide-1 .emoji-big {
            font-size: 48px;
            margin-bottom: 6px;
            animation: latido 2s infinite;
            flex-shrink: 0;
        }

        @keyframes latido {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        .slide-1 h1 {
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .slide-1 h1 span {
            font-weight: 700;
            color: #ff8aae;
        }

        .slide-1 .pregunta {
            font-size: clamp(14px, 3vw, 18px);
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            font-style: italic;
            border-left: 3px solid #ff8aae;
            padding-left: 12px;
            flex-shrink: 0;
        }

        .foto-ella {
            margin-top: 10px;
            width: clamp(90px, 22vw, 130px);
            height: clamp(90px, 22vw, 130px);
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 138, 174, 0.2);
            box-shadow: 0 0 40px rgba(255, 138, 174, 0.08);
            background: #1a0e1e;
            flex-shrink: 0;
        }

        .foto-label {
            margin-top: 4px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.1);
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            flex-shrink: 0;
        }

        /* SLIDE 2 */
        .slide-2 {
            background: linear-gradient(145deg, #1f1225, #0d080f);
            justify-content: center;
            gap: 2px;
        }

        .slide-2 .corazoncitos {
            font-size: 22px;
            letter-spacing: 6px;
            animation: flotar 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes flotar {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        .slide-2 .mensaje {
            font-size: clamp(14px, 3.5vw, 18px);
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.92);
            max-width: 340px;
            font-family: 'Georgia', serif;
            font-style: italic;
            padding: 0 2px;
            flex-shrink: 0;
        }

        .slide-2 .mensaje strong {
            color: #ff8aae;
            font-weight: 700;
            font-style: normal;
        }

        .slide-2 .mensaje .highlight {
            color: #ffb3cc;
            font-size: clamp(17px, 4vw, 22px);
            font-weight: 700;
        }

        .slide-2 .apodo {
            font-size: clamp(18px, 4vw, 24px);
            color: #ff8aae;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            flex-shrink: 0;
        }

        .slide-2 .fecha {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.12);
            font-family: 'Courier New', monospace;
            margin-top: 4px;
            letter-spacing: 3px;
            flex-shrink: 0;
        }

        .foto-dos {
            margin-top: 8px;
            width: clamp(60px, 15vw, 85px);
            height: clamp(60px, 15vw, 85px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 138, 174, 0.12);
            background: #1a0e1e;
            flex-shrink: 0;
        }

        /* Barra de progreso */
        .progress-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff8aae, #ff5f8a);
            border-radius: 10px;
            animation: progreso 8s linear forwards;
        }

        @keyframes progreso {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }

        /* Controles */
        .video-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.08);
            font-size: 16px;
            padding-top: 6px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        .video-controls span {
            font-size: 9px;
            opacity: 0.25;
            letter-spacing: 2px;
        }

        .video-controls .control-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.12);
            font-size: 18px;
            padding: 2px 8px;
            cursor: pointer;
            touch-action: manipulation;
            font-family: 'Courier New', monospace;
        }

        .video-controls .control-btn:active {
            color: #ff8aae;
            transform: scale(0.9);
        }

        .pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: rgba(255, 255, 255, 0.12);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .pause-indicator.show {
            opacity: 1;
        }

        /* Responsive para pantallas muy pequeñas */
        @media (max-width: 360px) {
            .video-container {
                padding: 10px 8px 12px;
                border-radius: 16px;
                height: 94vh;
            }
            .slide {
                padding: 10px 12px;
            }
            .slide-2 .mensaje {
                font-size: 13px;
                line-height: 1.5;
            }
            .slide-1 .emoji-big {
                font-size: 36px;
            }
            .slide-1 h1 {
                font-size: 18px;
            }
            .slide-2 .apodo {
                font-size: 16px;
            }
            .foto-ella {
                width: 70px;
                height: 70px;
            }
            .foto-dos {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-height: 600px) {
            .slide-1 .emoji-big {
                font-size: 30px;
                margin-bottom: 2px;
            }
            .slide-1 h1 {
                font-size: 16px;
            }
            .slide-1 .pregunta {
                font-size: 12px;
            }
            .slide-2 .mensaje {
                font-size: 12px;
                line-height: 1.4;
            }
            .slide-2 .apodo {
                font-size: 14px;
            }
            .foto-ella {
                width: 60px;
                height: 60px;
                margin-top: 4px;
            }
            .foto-dos {
                width: 45px;
                height: 45px;
                margin-top: 4px;
            }
            .video-frame {
                margin: 4px 0;
            }
            .video-container {
                padding: 10px 10px 12px;
                height: 96vh;
            }
            .slide {
                padding: 8px 12px;
            }
        }

        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="video-container">

        <!-- Barra superior -->
        <div class="video-bar">
            <div class="dots">
                <span class="dot-red"></span>
                <span class="dot-yellow"></span>
                <span class="dot-green"></span>
            </div>
            <span class="titulo">♥ 19 / 29 ♥</span>
            <span style="font-size:14px;">🍅</span>
        </div>

        <!-- Frame -->
        <div class="video-frame" id="videoFrame">

            <div class="pause-indicator" id="pauseIndicator">⏸</div>

            <!-- SLIDE 1 -->
            <div class="slide slide-1 active" id="slide1">
                <div class="emoji-big">🌸</div>
                <h1>¿Y si te digo que...</h1>
                <div class="pregunta">— hoy tengo algo para ti —</div>

                <!-- REEMPLAZA "foto-ella.jpg" -->
                <img src="04.jpg" alt="Ella" class="foto-ella" />

                <div class="foto-label">✦ TÚ ✦</div>
            </div>

            <!-- SLIDE 2 -->
            <div class="slide slide-2" id="slide2">
                <div class="corazoncitos">💕 ✨ 💕</div>
                <div class="mensaje">
                    "...hoy 19, solo faltan <strong>10 días</strong> para tu cumple, amol.<br><br>
                    Ya quiero que sea <span class="highlight">29</span> para poder felicitarte<br>
                    en tu día especial, mi vida.<br><br>
                    <strong>Te amo mucho, mi tomatito</strong> 🍅"
                </div>
                <div class="apodo">❤️ TOMATITO ❤️</div>
                <div class="fecha">19 · 29 · 2026</div>

                <!-- REEMPLAZA "foto-los-dos.jpg" -->
                <img src="03.jpg" alt="Los dos" class="foto-dos" />
            </div>

        </div>

        <!-- Barra de progreso -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Controles -->
        <div class="video-controls">
            <span>◄◄</span>
            <button class="control-btn" id="playBtn">▶</button>
            <button class="control-btn" id="resetBtn">⟳</button>
            <span>19/29</span>
        </div>

    </div>

    <script>
        // =========================================================
        // ELEMENTOS
        // =========================================================
        const slide1 = document.getElementById('slide1');
        const slide2 = document.getElementById('slide2');
        const frame = document.getElementById('videoFrame');
        const progressBar = document.getElementById('progressBar');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const pauseIndicator = document.getElementById('pauseIndicator');

        let pausado = false;
        let timeoutId = null;

        // =========================================================
        // FUNCIONES
        // =========================================================
        function cambiarASlide2() {
            slide1.classList.remove('active');
            slide2.classList.add('active');
            playBtn.textContent = '⏸';
            pausado = false;
        }

        function iniciarTemporizador() {
            if (timeoutId) clearTimeout(timeoutId);
            if (!pausado && slide1.classList.contains('active')) {
                timeoutId = setTimeout(cambiarASlide2, 3500);
            }
        }

        function togglePausa() {
            if (slide2.classList.contains('active')) {
                // Si ya terminó, reiniciamos
                reiniciar();
                return;
            }

            pausado = !pausado;

            if (pausado) {
                clearTimeout(timeoutId);
                progressBar.style.animationPlayState = 'paused';
                playBtn.textContent = '▶';
                pauseIndicator.classList.add('show');
                setTimeout(() => pauseIndicator.classList.remove('show'), 500);
            } else {
                progressBar.style.animationPlayState = 'running';
                playBtn.textContent = '⏸';
                iniciarTemporizador();
            }
        }

        function reiniciar() {
            clearTimeout(timeoutId);
            pausado = false;
            playBtn.textContent = '⏸';

            slide2.classList.remove('active');
            slide1.classList.add('active');

            progressBar.style.animation = 'none';
            void progressBar.offsetHeight;
            progressBar.style.animation = 'progreso 8s linear forwards';
            progressBar.style.animationPlayState = 'running';

            iniciarTemporizador();
        }

        // =========================================================
        // EVENTOS
        // =========================================================
        frame.addEventListener('click', togglePausa);

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePausa();
        });

        resetBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            reiniciar();
        });

        // =========================================================
        // INICIO
        // =========================================================
        iniciarTemporizador();

        progressBar.addEventListener('animationend', () => {
            if (slide1.classList.contains('active')) {
                cambiarASlide2();
            }
        });

        console.log('❤️ Día 19 de 29 — Para mi tomatito ❤️');
    </script>

</body>
</html>
